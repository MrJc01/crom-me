name: Release CLI Binaries

on:
  push:
    tags:
      - 'v*' # Aciona em todas as tags versionadas e.g., v0.2.1

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64 # Windows ARM64 ignorado provisoriamente
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          OUT=bin/crom-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUT="${OUT}.exe"
          fi
          go build -ldflags="-w -s" -o $OUT ./cmd/tunnel/main.go

      - name: Upload Workspace Artfacts (temporário)
        uses: actions/upload-artifact@v4
        with:
          name: crom-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (para notas e tags)
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: crom-cli-*
          path: bin
          merge-multiple: true

      - name: Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
          generate_release_notes: true
